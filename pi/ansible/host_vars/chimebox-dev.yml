---
# host_vars/chimebox-dev.yml -- overrides for the development Pi.
# This file is committed; values are not secrets, just per-host config.

# Pi 5 is housed in an Argon One V3 case; install the fan daemon.
chimebox_argon_one_v3: true

# This dev Pi is currently being driven via PiKVM as well as a local
# monitor. The pillarbox display profile breaks PiKVM (window/canvas
# size mismatch -> absolute coords don't map cleanly). Use the matched
# profile so PiKVM works; the local-monitor display becomes 1024x768
# stretched to fill the screen, which is fine for development.
chimebox_display_profile: matched-stretched
