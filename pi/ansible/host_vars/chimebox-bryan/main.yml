---
# host_vars/chimebox-bryan/main.yml -- overrides for chimebox-bryan.
# This file is committed; values are not secrets, just per-host config.

# Pi 5 is housed in an Argon One V3 case; install the fan daemon.
chimebox_argon_one_v3: true

# This dev Pi is currently being driven via PiKVM as well as a local
# monitor. The pillarbox display profile breaks PiKVM (window/canvas
# size mismatch -> absolute coords don't map cleanly). Use the matched
# profile so PiKVM works; the local-monitor display becomes 1024x768
# stretched to fill the screen, which is fine for development.
chimebox_display_profile: matched-stretched

# Opt the dev kiosk into the kid-reset panic-daemon combo so we can
# validate it end-to-end. Default for general users is off; we enable
# explicitly here.
chimebox_panic_button_kid_reset_enabled: true

# This is an operator/dev chimebox, not a kid-handoff. Enable the
# escape-to-tty combo so we can recover from network outages
# without a dirty power-cycle. Ctrl+Alt+Shift+T held 3s switches
# to tty2 (getty login); Ctrl+Alt+F1 returns to the Mac.
chimebox_panic_button_escape_to_tty_enabled: true

# Enable the Mac OS startup chime. BasiliskII doesn't produce one
# itself (emulators fast-path past the ROM POST sequence where the
# chime would normally play). This is host-side, played via aplay
# before each BasiliskII invocation. The WAV source path is in
# local.yml (gitignored, controller-specific). See
# roles/audio/README.md for sourcing guidance.
chimebox_audio_startup_chime_enabled: true

# This location's AP band-steers the Pi onto a 5GHz BSSID that's too
# weak from here, causing the wifi to thrash and eventually go silent
# (#23). Lock 2.4GHz, which is strong and stable from this spot. This
# is host-specific tuning -- do NOT copy it to units in other rooms.
chimebox_wifi_band: bg

# Remote wifi-only box: enable the last-resort rfkill cycle in the
# net-watchdog recovery ladder. Cheap insurance for a wedged radio
# when no one is on-site to power-cycle. Safe (rfkill ioctl only).
chimebox_net_watchdog_aggressive_recovery: true
