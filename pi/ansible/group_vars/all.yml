---
# group_vars/all.yml -- defaults for all chimebox hosts.

# Identity
chimebox_user: chimebox
chimebox_user_uid: 1500          # avoid colliding with default OS users
chimebox_user_groups:
  - audio
  - video
  - input
  - tty

# Filesystem layout on the Pi
chimebox_home: "/home/{{ chimebox_user }}"
chimebox_runtime_dir: "{{ chimebox_home }}/chimebox"
chimebox_snapshots_dir: "{{ chimebox_runtime_dir }}/snapshots"
chimebox_logs_dir: "{{ chimebox_runtime_dir }}/logs"
# Operator-blessed factory baseline. Lives OUTSIDE the rotating
# snapshots dir so 'chimebox-reset latest' never picks it up,
# the daily/weekly cron never overwrites it, and only the
# explicit 'chimebox-snapshot factory' command (or workstation
# scripts/factory-bless.sh) modifies it.
chimebox_factory_disk: "{{ chimebox_runtime_dir }}/factory.dsk"

# Disk image filenames (must match what scripts/push-disks.sh sends)
chimebox_rom_filename: "Quadra-650.rom"
chimebox_system_disk_filename: "System.dsk"
chimebox_library_disk_filename: "InfiniteHD.dsk"

# Emulator
chimebox_emulator: "BasiliskII"

# Display profile. Pick one of:
#   "pillarbox" -- 1920x1080 X canvas, 1440x1080 BasiliskII window
#                  centered with black bars on a 16:9 monitor.
#                  Undistorted Mac, sharp pixels. Best general default.
#                  Uses init_grab=true (relative-mouse capture). Best
#                  for physical mouse / kiosk use; the cursor cannot
#                  leave the Mac screen.
#                  *** Does NOT work with PiKVM/VNC remote pointers ***
#                  because the pillarbox creates a window/canvas size
#                  mismatch and absolute coords don't map cleanly.
#
#   "matched-stretched" -- 1024x768 X canvas, 1024x768 BasiliskII window
#                  matched. The monitor's hardware scaler stretches to
#                  fill native resolution; on 16:9 monitors this is
#                  horizontally distorted. Period-authentic chunky
#                  pixels. Uses init_grab=false (absolute pointer).
#                  *** Required for PiKVM/VNC use *** (no offset
#                  between X canvas and emulator window).
#
#   "native-sharp" -- 1920x1080 X canvas, 1920x1080 BasiliskII window
#                  matched. Edge-to-edge, sharp, but Mac OS 8.1 menus
#                  and icons end up small. Probably not what you want
#                  for a young first-computer user.
#
# Override per-host in host_vars/<hostname>.yml.
chimebox_display_profile: pillarbox

# Derived display values; override directly to break out of the
# profiles, e.g. for a non-1080p monitor.
_chimebox_display_profiles:
  pillarbox:
    x_display_width: 1920
    x_display_height: 1080
    screen_width: 1440
    screen_height: 1080
    center_window: true
    init_grab: true
  matched-stretched:
    x_display_width: 1024
    x_display_height: 768
    screen_width: 1024
    screen_height: 768
    center_window: false
    init_grab: false
  native-sharp:
    x_display_width: 1920
    x_display_height: 1080
    screen_width: 1920
    screen_height: 1080
    center_window: false
    init_grab: false

chimebox_x_display_width: "{{ _chimebox_display_profiles[chimebox_display_profile].x_display_width }}"
chimebox_x_display_height: "{{ _chimebox_display_profiles[chimebox_display_profile].x_display_height }}"
chimebox_screen_width: "{{ _chimebox_display_profiles[chimebox_display_profile].screen_width }}"
chimebox_screen_height: "{{ _chimebox_display_profiles[chimebox_display_profile].screen_height }}"
chimebox_center_window: "{{ _chimebox_display_profiles[chimebox_display_profile].center_window }}"
chimebox_init_grab: "{{ _chimebox_display_profiles[chimebox_display_profile].init_grab }}"

chimebox_ram_mb: 128
chimebox_modelid: 14             # Quadra 650
chimebox_cpu: 4                  # 68040
chimebox_fpu: true
# JIT was historically x86-only in BasiliskII; on aarch64 the build
# falls back to interpreter even when JIT is requested, and asking for
# JIT may add overhead. Default off on Pi; Pi 5 has plenty of headroom
# for interpretive 68040 emulation of Mac OS 8.1.
chimebox_jit: false

# Persistence / snapshots
chimebox_snapshot_keep_daily: 7
chimebox_snapshot_keep_weekly: 4
chimebox_snapshot_hour: 3        # 03:00 local time
chimebox_snapshot_minute: 17     # offset from the hour to avoid the rush

# Shutdown semantics: what start.sh does when BasiliskII exits
# (Mac OS 8.1's Special > Shut Down inside the guest).
#
#   "restart" -- just restart BasiliskII in place, with X kept up so
#                the visual transition is a brief black screen rather
#                than a full X teardown / login flicker. This is the
#                only supported value in v1.
#
# Future v2 values (planned):
#   "restart-with-rollback" -- on Mac shutdown, restore System.dsk
#                from factory.dsk before restart. Becomes a "panic
#                button" for the kid. The factory baseline support
#                exists today (chimebox-snapshot factory /
#                chimebox-reset factory / scripts/factory-bless.sh
#                / scripts/factory-reset.sh); what's missing is a
#                robust shutdown discriminator, since BasiliskII
#                exits 0 on fatal errors too, so rc alone isn't
#                safe to use as a "kid asked for shutdown" signal.
#   "poweroff" -- Mac shutdown -> Pi systemctl poweroff. Needs
#                sudoers entry for chimebox user.
#   "reboot"   -- Mac shutdown -> Pi reboot (cycles back through
#                Plymouth splash). Needs sudoers entry too.
chimebox_shutdown_action: restart

# Argon One V3 case (optional)
# Set to true if the Pi is housed in an Argon One V3 case. Installs the
# I2C fan/power-button daemon. Default false because most users won't
# have this case. See roles/argon-one-v3/README.md.
chimebox_argon_one_v3: false

# Lockdown toggles (most users want all of these on)
chimebox_disable_screen_blanking: true
chimebox_hide_host_cursor: true
chimebox_disable_usb_boot: false # opt-in; some setups still need USB boot

# Outside-World feature: a host directory appears as a folder on the
# Mac OS desktop (via BasiliskII's extfs), and USB sticks plugged into
# the Pi auto-mount as sub-folders inside it. Default ON because it's
# inert if no USB sticks are inserted -- the user just gets an empty
# "outside-world" folder on the Mac. Opt out by setting to false in
# host_vars/<host>.yml. See roles/outside-world/README.md.
chimebox_outside_world_enabled: true
