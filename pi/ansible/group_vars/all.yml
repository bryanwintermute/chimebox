---
# group_vars/all.yml -- defaults for all chimebox hosts.

# Identity
chimebox_user: chimebox
chimebox_user_uid: 1500          # avoid colliding with default OS users
chimebox_user_groups:
  - audio
  - video
  - input
  - tty

# Filesystem layout on the Pi
chimebox_home: "/home/{{ chimebox_user }}"
chimebox_runtime_dir: "{{ chimebox_home }}/chimebox"
chimebox_snapshots_dir: "{{ chimebox_runtime_dir }}/snapshots"
chimebox_logs_dir: "{{ chimebox_runtime_dir }}/logs"

# Disk image filenames (must match what scripts/push-disks.sh sends)
chimebox_rom_filename: "Quadra-650.rom"
chimebox_system_disk_filename: "System.dsk"
chimebox_library_disk_filename: "InfiniteHD.dsk"

# Emulator
chimebox_emulator: "BasiliskII"

# Display configuration.
#
# Three common modes work well; pick by overriding the four variables
# below. Default is 'pillarbox' which is the best general choice for a
# modern 16:9 monitor.
#
#   1. PILLARBOX (default).
#      X canvas at 1920x1080 (the monitor's likely native), Basilisk II
#      guest at 1440x1080 (4:3) centered. Result: undistorted Mac
#      screen with black bars on left/right. Sharp pixels, correct
#      aspect, kid-friendly UI sizing.
#         chimebox_x_display_width: 1920
#         chimebox_x_display_height: 1080
#         chimebox_screen_width: 1440
#         chimebox_screen_height: 1080
#         chimebox_center_window: true
#
#   2. STRETCHED FULLSCREEN (period-authentic).
#      X canvas and Basilisk II both at 1024x768. The monitor's hardware
#      scaler stretches to fill its native resolution. On 16:9 monitors
#      this distorts horizontally (Mac windows look wide). Some people
#      prefer this for the chunky big-pixel feel; for kid use on 16:9 the
#      pillarbox above is usually nicer.
#         chimebox_x_display_width: 1024
#         chimebox_x_display_height: 768
#         chimebox_screen_width: 1024
#         chimebox_screen_height: 768
#         chimebox_center_window: false
#
#   3. NATIVE SHARP.
#      X and Basilisk II both at 1920x1080 (or whatever the monitor's
#      native is). Edge to edge, sharp, but Mac OS 8.1 menus and icons
#      end up small on a large screen. Probably not what you want for
#      a 6.5-year-old; fine for an adult tinker session.
#         chimebox_x_display_width: 1920
#         chimebox_x_display_height: 1080
#         chimebox_screen_width: 1920
#         chimebox_screen_height: 1080
#         chimebox_center_window: false

# X display canvas size (set via xrandr at session start)
chimebox_x_display_width: 1920
chimebox_x_display_height: 1080

# Basilisk II guest screen size (written into ~/.config/BasiliskII/prefs)
chimebox_screen_width: 1440
chimebox_screen_height: 1080

# When the Basilisk II window is smaller than the X canvas, center it
# inside the canvas via SDL_VIDEO_CENTERED. Only meaningful when the
# emulator window != display size (i.e. profile 1 above).
chimebox_center_window: true

chimebox_ram_mb: 128
chimebox_modelid: 14             # Quadra 650
chimebox_cpu: 4                  # 68040
chimebox_fpu: true
# JIT was historically x86-only in BasiliskII; on aarch64 the build
# falls back to interpreter even when JIT is requested, and asking for
# JIT may add overhead. Default off on Pi; Pi 5 has plenty of headroom
# for interpretive 68040 emulation of Mac OS 8.1.
chimebox_jit: false

# Persistence / snapshots
chimebox_snapshot_keep_daily: 7
chimebox_snapshot_keep_weekly: 4
chimebox_snapshot_hour: 3        # 03:00 local time
chimebox_snapshot_minute: 17     # offset from the hour to avoid the rush

# Argon One V3 case (optional)
# Set to true if the Pi is housed in an Argon One V3 case. Installs the
# I2C fan/power-button daemon. Default false because most users won't
# have this case. See roles/argon-one-v3/README.md.
chimebox_argon_one_v3: false

# Lockdown toggles (most users want all of these on)
chimebox_disable_screen_blanking: true
chimebox_hide_host_cursor: true
chimebox_disable_usb_boot: false # opt-in; some setups still need USB boot
