---
# playbook.yml -- top-level chimebox provisioning playbook.
#
# Run from your workstation:
#   ansible-playbook -i inventory.ini playbook.yml
#
# All roles are idempotent. Re-running is safe and a quick no-op when nothing
# has drifted.

- name: Provision chimebox
  hosts: chimebox
  become: true
  gather_facts: true

  pre_tasks:
    - name: Sanity check -- target is a Raspberry Pi running aarch64 Linux
      ansible.builtin.assert:
        that:
          - ansible_architecture == "aarch64"
          - ansible_system == "Linux"
        fail_msg: >-
          chimebox targets aarch64 Linux (e.g. Raspberry Pi OS 64-bit on
          a Pi 4/5). Detected {{ ansible_system }} {{ ansible_architecture }}.

    - name: Sanity check -- Debian-family distro (Raspberry Pi OS)
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >-
          chimebox is built around apt-based distros. Detected {{ ansible_os_family }}.

  roles:
    - role: base
      tags: [base]
    - role: journald
      tags: [journald, observability]
      when: chimebox_journald_persistent | default(true) | bool
    - role: kiosk-user
      tags: [kiosk-user, user]
    - role: basiliskii
      tags: [basiliskii, emulator]
    - role: kiosk-x
      tags: [kiosk-x, x11, display]
    - role: chimebox
      tags: [chimebox, runtime]
    - role: clean-shutdown
      tags: [clean-shutdown, shutdown]
      when: chimebox_clean_shutdown_enabled | default(true) | bool
    - role: persistence
      tags: [persistence, snapshots]
    - role: lockdown
      tags: [lockdown, security]
    - role: audio
      tags: [audio]
      when: chimebox_audio_enabled | default(true) | bool
    - role: egress-firewall
      tags: [egress-firewall, firewall, security]
      when: chimebox_egress_firewall_enabled | default(true) | bool
    - role: argon-one-v3
      tags: [argon-one-v3, argon, hardware]
      when: chimebox_argon_one_v3 | bool
    - role: boot-splash
      tags: [boot-splash, splash, plymouth]
      when: chimebox_boot_splash_enabled | default(true) | bool
    - role: outside-world
      tags: [outside-world]
      when: chimebox_outside_world_enabled | default(false) | bool
    - role: panic-button
      tags: [panic-button, panic, recovery]
      when: chimebox_panic_button_enabled | default(true) | bool
    - role: net-watchdog
      tags: [net-watchdog, recovery, networking]
      when: chimebox_net_watchdog_enabled | default(true) | bool
    - role: wifi-tuning
      tags: [wifi-tuning, networking]
      when: chimebox_wifi_tuning_enabled | default(true) | bool
    - role: wifi-networks
      tags: [wifi-networks, networking, wifi]
      when: chimebox_wifi_networks | default([]) | length > 0
    - role: pmic-watchdog
      tags: [pmic-watchdog, observability]
      when: chimebox_pmic_watchdog_enabled | default(true) | bool
    - role: phone-home
      tags: [phone-home, networking, wireguard]
      when: chimebox_phone_home_enabled | default(false) | bool

  post_tasks:
    - name: Print next steps
      ansible.builtin.debug:
        msg:
          - "Provisioning complete on {{ inventory_hostname }}."
          - ""
          - "Next steps from your workstation:"
          - "  1. Push prepared disks: ../../scripts/push-disks.sh"
          - "  2. Reboot the Pi (it should come up in the chimebox kiosk)"
