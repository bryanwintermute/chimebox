---
# roles/wifi-networks/tasks/main.yml
#
# Lay down a NetworkManager keyfile per entry in chimebox_wifi_networks.
# The Imager-baked Wi-Fi profile is NOT preserved once provisioning runs --
# only the networks listed here survive. So list every SSID the box needs
# (deployment net, and the build-site net too if you want Wi-Fi at the
# bench); NM auto-connects to whichever known SSID is in range. Managed
# reproducibly from the host's gitignored local.yml.

- name: Deploy NetworkManager wifi connection profiles
  ansible.builtin.template:
    src: wifi.nmconnection.j2
    dest: >-
      /etc/NetworkManager/system-connections/chimebox-{{
        item.ssid | regex_replace('[^A-Za-z0-9_-]', '-') }}.nmconnection
    owner: root
    group: root
    mode: "0600"
  loop: "{{ chimebox_wifi_networks }}"
  loop_control:
    label: "{{ item.ssid }}"
  # no_log: the template renders the PSK; never echo it to stdout/logs.
  no_log: true
  notify: Reload NetworkManager connections
