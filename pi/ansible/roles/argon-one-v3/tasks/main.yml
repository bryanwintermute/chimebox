---
# roles/argon-one-v3/tasks/main.yml

- name: Install Argon daemon dependencies (apt)
  ansible.builtin.apt:
    name:
      - python3-libgpiod
      - python3-smbus
      - i2c-tools
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure I2C is enabled
  ansible.builtin.command: raspi-config nonint do_i2c 0
  register: i2c_enable
  changed_when: false
  failed_when:
    - i2c_enable.rc != 0
    - "'not found' not in (i2c_enable.stderr | default(''))"

- name: Create Argon install directory
  ansible.builtin.file:
    path: "{{ chimebox_argon_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Fetch Argon Python sources (pinned by sha256)
  ansible.builtin.get_url:
    url: "{{ chimebox_argon_download_base }}/{{ item.url }}"
    dest: "{{ chimebox_argon_install_dir }}/{{ item.dest }}"
    checksum: "sha256:{{ item.sha256 }}"
    owner: root
    group: root
    mode: "0644"
    force: false  # idempotent; don't re-download if already correct
  loop: "{{ chimebox_argon_files }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Install argononed systemd unit
  ansible.builtin.template:
    src: argononed.service.j2
    dest: /lib/systemd/system/argononed.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd and restart argononed

- name: Install fan curve config
  ansible.builtin.template:
    src: argononed.conf.j2
    dest: /etc/argononed.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart argononed

- name: Enable and start argononed
  ansible.builtin.systemd:
    name: argononed.service
    enabled: true
    state: started
    daemon_reload: true

# --- Full power-off on shutdown (no red-light limbo) -------------------
# The Argon V3 MCU only cuts power if (a) GPIO14/UART TXD is driven, so it
# sees a high->low edge at halt, and (b) it has been armed via I2C 0xFF
# during shutdown. See templates/argononed-poweroff.service.j2.

- name: Back up /boot/firmware/config.txt (first run only)
  ansible.builtin.copy:
    src: /boot/firmware/config.txt
    dest: /boot/firmware/config.txt.chimebox-bak
    remote_src: true
    force: false
    owner: root
    group: root
    mode: "0755"
  when: chimebox_argon_power_cut_on_shutdown | bool

- name: Enable GPIO14 UART so the Argon MCU can detect halt (TXD low)
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    line: "enable_uart=1"
    regexp: '^#?\s*enable_uart\s*='
    state: present
  when: chimebox_argon_power_cut_on_shutdown | bool
  # config.txt changes take effect on next boot; note printed below.
  register: argon_uart_cfg

- name: Install Argon poweroff-arming systemd unit
  ansible.builtin.template:
    src: argononed-poweroff.service.j2
    dest: /etc/systemd/system/argononed-poweroff.service
    owner: root
    group: root
    mode: "0644"
  when: chimebox_argon_power_cut_on_shutdown | bool
  notify: Reload systemd for argon

- name: Enable Argon poweroff-arming unit
  ansible.builtin.systemd:
    name: argononed-poweroff.service
    enabled: true
    state: started
    daemon_reload: true
  when: chimebox_argon_power_cut_on_shutdown | bool

- name: Remove Argon poweroff-arming unit when power-cut is disabled
  when: not (chimebox_argon_power_cut_on_shutdown | bool)
  block:
    - name: Stop and disable the poweroff-arming unit
      ansible.builtin.systemd:
        name: argononed-poweroff.service
        enabled: false
        state: stopped
      failed_when: false

    - name: Remove the poweroff-arming unit file
      ansible.builtin.file:
        path: /etc/systemd/system/argononed-poweroff.service
        state: absent
      notify: Reload systemd for argon

- name: Note that enabling UART needs a reboot to take effect
  ansible.builtin.debug:
    msg: >-
      enable_uart was just added to config.txt; the Argon full-power-off
      behavior takes effect after the next reboot.
  when:
    - chimebox_argon_power_cut_on_shutdown | bool
    - argon_uart_cfg is changed

- name: Apply Argon-recommended EEPROM config tweaks
  ansible.builtin.include_tasks: eeprom-config.yml
  when: chimebox_argon_apply_eeprom_tweaks | bool
