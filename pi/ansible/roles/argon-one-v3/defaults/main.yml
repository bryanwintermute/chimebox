---
# roles/argon-one-v3/defaults/main.yml

# Default fan curve. Override in group_vars/all.yml or host_vars to taste.
# List of {temp: <celsius>, speed: <percent 0-100>} pairs, sorted by temp.
chimebox_argon_fan_curve:
  - {temp: 55, speed: 10}
  - {temp: 60, speed: 25}
  - {temp: 65, speed: 55}
  - {temp: 70, speed: 100}

# Argon's CDN base URL. Override if you want to vendor the files
# elsewhere (e.g., your own mirror).
chimebox_argon_download_base: "https://download.argon40.com/scripts"

# Where the daemon files live on the Pi. Matches upstream conventions
# so any unsupported tooling that expects /etc/argon/ keeps working.
chimebox_argon_install_dir: /etc/argon

# Files we fetch from upstream. Each entry is {dest, url, sha256}. The
# sha256 is what we expect; if it changes, the get_url module will fail
# and we know upstream changed and we should re-pin.
chimebox_argon_files:
  - dest: argononed.py
    url: argononed.py
    sha256: fe0df8e7613e7958537176c18e87bbc8d0277b2a182686e8feb3082c438437e2
  - dest: argonsysinfo.py
    url: argonsysinfo.py
    sha256: 0e5a1f70d11267f09c20b8fde1bb5dc44c3e49f1f912a4b2df238ba080723e4c
  - dest: argonregister.py
    url: argonregister.py
    sha256: 0aceb338a1e567a91c2de4317ac3c57f674e245f4120525a4195fcda0167c04b
  - dest: argonpowerbutton.py
    url: argonpowerbutton-libgpiod.py
    sha256: 14d44370b59e6b46d601a0fb455b07da36b1af1c84b2089427b7c83ba6c0ddc9

# Fully cut case power when the Pi powers off (so a Mac "Shut Down" leaves
# the box DARK, not lingering at the red standby LED). Requires enabling
# the GPIO14 UART (so TXD has a defined high->low edge at halt) and a
# shutdown hook that arms the Argon MCU via I2C 0xFF. Set false to keep the
# stock behavior (Pi halts, case stays powered) -- e.g. if you instead use
# the case's boot-on-power jumper, which deliberately keeps power applied.
# NOTE: the config.txt enable_uart change needs a reboot to take effect.
chimebox_argon_power_cut_on_shutdown: true

# EEPROM bootloader config tweaks recommended by Argon for the V3 case.
# Default true when chimebox_argon_one_v3 itself is true; users can
# override per-host. The tweaks are:
#   POWER_OFF_ON_HALT=1   `sudo poweroff` actually cuts power (vs. idle hot)
#   WAKE_ON_GPIO=0        only the case power button wakes the Pi
#   BOOT_ORDER per chimebox_argon_boot_order (NVMe-first by default)
#   PCIE_PROBE=1          bootloader actively probes PCIe for the NVMe HAT
# Reversible: rerun with this set false (then re-edit the EEPROM
# manually if you want to revert), or use `sudo rpi-eeprom-config --edit`.
chimebox_argon_apply_eeprom_tweaks: true

# Boot order. 0xf416 = NVMe, then SD, then USB, then network. Best for a
# Pi 5 booting from NVMe. Other notable values:
#   0xf461  default Pi OS  (SD, NVMe, USB, network)
#   0xf41   NVMe, SD, USB    (skips network)
#   0xf164  USB, SD, NVMe, network
chimebox_argon_boot_order: "0xf416"
