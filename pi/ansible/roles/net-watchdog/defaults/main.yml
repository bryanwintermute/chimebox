---
# roles/net-watchdog/defaults/main.yml

# Master switch. Default ON because chimeboxes that lose
# networking become operator-locked-out (the kiosk swallows X
# input, no SSH path, no out-of-band recovery short of a dirty
# power-cycle). Net-watchdog auto-recovers most common wifi
# flake scenarios with no operator action.
chimebox_net_watchdog_enabled: true

# How often the check runs (seconds). 60s keeps recovery
# responsive without thrashing on transient flakes.
chimebox_net_watchdog_interval_seconds: 60

# How many consecutive failed checks before recovery is attempted.
# 3 means a sustained 3-minute outage triggers recovery, while
# brief flakes (one or two missed packets) are ignored.
chimebox_net_watchdog_max_consecutive_failures: 3

# Reachability target. Empty string means "use the current default
# gateway from `ip route`," which auto-adapts to any LAN. Override
# with a fixed IP if you want a more robust target than the
# gateway itself (e.g. an internal DNS server known to be up
# whenever the LAN is healthy).
chimebox_net_watchdog_target: ""

# Recovery action when threshold is reached. Default is the
# escalation ladder:
#   1. nmcli connection up <current active connection>
#   2. systemctl restart NetworkManager
# If both fail, the watchdog logs loudly via `logger -t` and gives
# up; it never reboots the Pi (operator decides whether the
# situation warrants escalation).
chimebox_net_watchdog_recovery_via_nmcli: true
chimebox_net_watchdog_recovery_via_restart: true

# Optional aggressive last-resort recovery. When the gentle ladder
# above (nmcli connection up, NetworkManager restart) fails to restore
# connectivity, cycle the wifi radio with rfkill (block then unblock)
# to clear a stuck soft-block / RF state *below* NetworkManager, then
# nudge the uplink back up. Off by default: the gentle ladder recovers
# every failure observed so far (see #23); this is insurance for a
# genuinely wedged radio on a remote wifi box. Never reboots.
# Requires the 'rfkill' package (present on Raspberry Pi OS). Uses
# only the rfkill ioctl, so no service-sandbox relaxation is needed.
chimebox_net_watchdog_aggressive_recovery: false

# Path to the rfkill binary (only used when aggressive recovery is on).
chimebox_net_watchdog_rfkill_bin: /usr/sbin/rfkill

# Treat a totally-missing default route as a failure and run the
# recovery ladder. This is the most important silent-failure mode on
# a wifi chimebox: when the uplink dies completely there is no
# gateway to ping, so older logic that skipped "no default gateway"
# ticks never recovered and the box went silent for days. Set to
# false only for hosts that are intentionally offline.
chimebox_net_watchdog_recover_on_no_gateway: true

# NetworkManager connection name to bring up during recovery.
# Empty = auto-detect: the active connection if any, else the first
# wifi connection profile (so recovery works even when the uplink is
# fully down and nothing is active). Set explicitly if auto-detect
# would pick the wrong one, e.g. "netplan-wlan0-<SSID>".
chimebox_net_watchdog_uplink_connection: ""
