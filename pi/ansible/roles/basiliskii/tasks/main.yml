---
# roles/basiliskii/tasks/main.yml

# Strategy: try apt first; if it fails, build from source.
# (For v1 we assume apt works on Raspberry Pi OS Trixie/Bookworm aarch64
# with the 'contrib' component enabled, which is the Pi OS default.)

- name: Ensure 'contrib' component is enabled for basilisk2 (which lives there)
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list
    regexp: '^(deb\s+http\S+\s+\S+)\s+main(?!\s+contrib)'
    line: '\1 main contrib'
    backrefs: true
    state: present
  register: contrib_enabled
  failed_when: false

- name: Refresh apt cache if contrib was just added
  ansible.builtin.apt:
    update_cache: true
  when: contrib_enabled.changed | default(false)

- name: Install Basilisk II via apt
  ansible.builtin.apt:
    name:
      - basilisk2     # the emulator itself
      - libsdl2-2.0-0 # runtime, in case the package doesn't pull it
    state: present
    update_cache: true
    cache_valid_time: 3600
  register: b2_apt
  failed_when: false
  changed_when: b2_apt.changed | default(false)

# Note: 'basilisk2' is the apt package name on Raspberry Pi OS
# Bookworm/Trixie aarch64; validated on the chimebox-dev Pi 5.
# If a future apt repo changes that, the verify-on-PATH check below
# fires and the failure message points at build-from-source.yml.
- name: Verify Basilisk II binary is on PATH
  ansible.builtin.command: which BasiliskII
  register: b2_which
  changed_when: false
  failed_when: false

- name: Fail with a helpful message if Basilisk II isn't available
  ansible.builtin.fail:
    msg: |
      Basilisk II (BasiliskII binary) was not found after apt install.
      The 'basilisk2' package may not be available for this distro/arch
      combination, or the 'contrib' component is not enabled. Options:
        1. Verify /etc/apt/sources.list contains 'contrib' on the main line
        2. Add a different apt source that ships Basilisk II for aarch64
        3. Build from source against ../../third_party/infinite-mac/macemu
           (the build-from-source path is documented in tasks/build-from-source.yml
           but not yet implemented; please file an issue if you hit this).
  when: b2_which.rc != 0
