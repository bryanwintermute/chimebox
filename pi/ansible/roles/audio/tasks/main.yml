---
# roles/audio/tasks/main.yml

- name: Install alsa-utils
  ansible.builtin.apt:
    name:
      - alsa-utils   # provides amixer, alsactl, aplay
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install chimebox-audio-init script
  ansible.builtin.template:
    src: chimebox-audio-init.sh.j2
    dest: /usr/local/sbin/chimebox-audio-init
    mode: "0755"
    owner: root
    group: root
  notify: Restart chimebox-audio-init

- name: Install chimebox-audio-list helper
  ansible.builtin.template:
    src: chimebox-audio-list.sh.j2
    dest: /usr/local/sbin/chimebox-audio-list
    mode: "0755"
    owner: root
    group: root

- name: Install chimebox-audio-init systemd unit
  ansible.builtin.template:
    src: chimebox-audio-init.service.j2
    dest: /etc/systemd/system/chimebox-audio-init.service
    mode: "0644"
    owner: root
    group: root
  notify:
    - Reload systemd
    - Restart chimebox-audio-init

- name: Enable and start chimebox-audio-init
  ansible.builtin.systemd:
    name: chimebox-audio-init.service
    enabled: "{{ chimebox_audio_enabled | bool }}"
    state: "{{ 'started' if chimebox_audio_enabled | bool else 'stopped' }}"
    daemon_reload: true

# Startup chime: optional, opt-in. See defaults/main.yml for the
# enable / source variables. The WAV file lives in /usr/local/share
# (sibling-ish to the audio-init script's /usr/local/sbin location).
- name: Ensure /usr/local/share/chimebox directory exists
  ansible.builtin.file:
    path: /usr/local/share/chimebox
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: chimebox_audio_startup_chime_enabled | bool

- name: Validate startup chime source path is configured
  ansible.builtin.assert:
    that:
      - chimebox_audio_startup_chime_src is string
      - chimebox_audio_startup_chime_src | length > 0
    fail_msg: |
      `chimebox_audio_startup_chime_enabled` is true but
      `chimebox_audio_startup_chime_src` is empty. Set the
      controller-side path to your startup-chime WAV in
      host_vars/<host>/local.yml. See roles/audio/README.md
      for sourcing guidance.
  when: chimebox_audio_startup_chime_enabled | bool

- name: Install startup chime WAV
  ansible.builtin.copy:
    src: "{{ chimebox_audio_startup_chime_src }}"
    dest: /usr/local/share/chimebox/startup-chime.wav
    owner: root
    group: root
    mode: "0644"
  when: chimebox_audio_startup_chime_enabled | bool

- name: Remove startup chime WAV when disabled
  ansible.builtin.file:
    path: /usr/local/share/chimebox/startup-chime.wav
    state: absent
  when: not (chimebox_audio_startup_chime_enabled | bool)
