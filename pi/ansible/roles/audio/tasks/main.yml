---
# roles/audio/tasks/main.yml

- name: Install alsa-utils
  ansible.builtin.apt:
    name:
      - alsa-utils   # provides amixer, alsactl, aplay
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install chimebox-audio-init script
  ansible.builtin.template:
    src: chimebox-audio-init.sh.j2
    dest: /usr/local/sbin/chimebox-audio-init
    mode: "0755"
    owner: root
    group: root
  notify: Restart chimebox-audio-init

- name: Install chimebox-audio-list helper
  ansible.builtin.template:
    src: chimebox-audio-list.sh.j2
    dest: /usr/local/sbin/chimebox-audio-list
    mode: "0755"
    owner: root
    group: root

- name: Install chimebox-audio-init systemd unit
  ansible.builtin.template:
    src: chimebox-audio-init.service.j2
    dest: /etc/systemd/system/chimebox-audio-init.service
    mode: "0644"
    owner: root
    group: root
  notify:
    - Reload systemd
    - Restart chimebox-audio-init

- name: Enable and start chimebox-audio-init
  ansible.builtin.systemd:
    name: chimebox-audio-init.service
    enabled: "{{ chimebox_audio_enabled | bool }}"
    state: "{{ 'started' if chimebox_audio_enabled | bool else 'stopped' }}"
    daemon_reload: true
