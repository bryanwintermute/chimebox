---
# roles/chimebox/tasks/main.yml

- name: Install chimebox runtime directory tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ chimebox_user }}"
    group: "{{ chimebox_user }}"
    mode: "0750"
  loop:
    - "{{ chimebox_runtime_dir }}"
    - "{{ chimebox_snapshots_dir }}"
    - "{{ chimebox_logs_dir }}"
    - "{{ chimebox_home }}/.config"
    - "{{ chimebox_home }}/.config/BasiliskII"

- name: Check whether the library disk has been pushed
  ansible.builtin.stat:
    path: "{{ chimebox_runtime_dir }}/{{ chimebox_library_disk_filename }}"
  register: chimebox_library_disk_stat
  changed_when: false

- name: Set library disk presence fact
  ansible.builtin.set_fact:
    chimebox_library_disk_present: "{{ chimebox_library_disk_stat.stat.exists }}"

- name: Install BasiliskII prefs
  ansible.builtin.template:
    src: basiliskii-prefs.j2
    dest: "{{ chimebox_home }}/.config/BasiliskII/prefs"
    owner: "{{ chimebox_user }}"
    group: "{{ chimebox_user }}"
    mode: "0640"

- name: Install chimebox start.sh
  ansible.builtin.template:
    src: start.sh.j2
    dest: "{{ chimebox_runtime_dir }}/start.sh"
    owner: "{{ chimebox_user }}"
    group: "{{ chimebox_user }}"
    mode: "0750"

# When chimebox_shutdown_action powers off / reboots the Pi on an in-Mac
# "Shut Down", start.sh (running as the kiosk user) needs to invoke that
# one systemctl verb as root. Grant exactly that, and nothing more.
- name: Install sudoers drop-in for in-Mac shutdown
  ansible.builtin.template:
    src: sudoers-chimebox-shutdown.j2
    dest: /etc/sudoers.d/chimebox-shutdown
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
  when: chimebox_shutdown_action | default('restart') in ['poweroff', 'reboot']

- name: Remove in-Mac shutdown sudoers drop-in when not used
  ansible.builtin.file:
    path: /etc/sudoers.d/chimebox-shutdown
    state: absent
  when: chimebox_shutdown_action | default('restart') not in ['poweroff', 'reboot']

- name: Install chimebox .xinitrc
  ansible.builtin.template:
    src: xinitrc.j2
    dest: "{{ chimebox_home }}/.xinitrc"
    owner: "{{ chimebox_user }}"
    group: "{{ chimebox_user }}"
    mode: "0644"

- name: Install chimebox systemd service
  ansible.builtin.template:
    src: chimebox.service.j2
    dest: /etc/systemd/system/chimebox.service
    mode: "0644"
  notify: Reload systemd

# Note: we deliberately do NOT enable chimebox.service yet. The user's
# autologin -> startx pipeline (set up by kiosk-user) is what runs the
# kiosk in v1. The systemd unit is here as a future supervision wrapper
# that will replace the autologin path in v2.
- name: Ensure chimebox.service is disabled in v1
  ansible.builtin.systemd:
    name: chimebox.service
    enabled: false
    state: stopped
  failed_when: false
