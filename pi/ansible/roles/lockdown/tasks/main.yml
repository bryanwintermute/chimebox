---
# roles/lockdown/tasks/main.yml

- name: Disable VT switching from X (Ctrl-Alt-Fn)
  ansible.builtin.copy:
    dest: /etc/X11/xorg.conf.d/10-no-vt-switch.conf
    mode: "0644"
    content: |
      # Managed by chimebox Ansible (lockdown role).
      Section "ServerFlags"
          Option "DontVTSwitch" "true"
          Option "DontZap" "true"
      EndSection
  # `DontVTSwitch` may not be strictly honored under modesetting on
  # Pi 5; we don't depend on it. The "Mask unused getty TTYs" task
  # below is the actual belt-and-braces guard against accidental
  # VT switching by an inquisitive kid.

- name: Mask unused getty TTYs
  ansible.builtin.systemd:
    name: "getty@tty{{ item }}.service"
    masked: true
  loop: [2, 3, 4, 5, 6]
  # When escape-to-tty is enabled, leave that one VT unmasked so
  # the panic-daemon's escape combo can land on an actual login
  # prompt. X's DontVTSwitch above still blocks the kid from
  # Ctrl+Alt+Fn directly; only the long-hold panic combo (which
  # reads evdev below X) gets there.
  when: not (chimebox_panic_button_escape_to_tty_enabled | default(false) | bool) or
        item != (chimebox_panic_button_escape_to_tty_target_vt | default(2) | int)

- name: Unmask escape-to-tty target VT (only when escape is enabled)
  ansible.builtin.systemd:
    name: "getty@tty{{ chimebox_panic_button_escape_to_tty_target_vt | default(2) | int }}.service"
    masked: false
  when: chimebox_panic_button_escape_to_tty_enabled | default(false) | bool

- name: Verify chimebox user has no sudoers entries
  ansible.builtin.shell: |
    set -o pipefail
    if grep -rE "^[^#]*\\b{{ chimebox_user }}\\b" /etc/sudoers /etc/sudoers.d 2>/dev/null; then
        exit 1
    fi
    exit 0
  args:
    executable: /bin/bash
  changed_when: false
  register: chimebox_in_sudoers
  failed_when: chimebox_in_sudoers.rc != 0
