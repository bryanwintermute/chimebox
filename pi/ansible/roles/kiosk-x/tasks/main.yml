---
# roles/kiosk-x/tasks/main.yml

- name: Install minimal X11 stack
  ansible.builtin.apt:
    name:
      - xserver-xorg
      - xserver-xorg-input-libinput
      # Note: do NOT install xserver-xorg-video-fbdev on Pi 5. The Pi 5
      # kernel uses KMS/DRM, and the modesetting driver (bundled with
      # xserver-xorg-core) handles display. fbdev being present causes X
      # to try framebuffer mode and fail with "Cannot run in framebuffer
      # mode. Please specify busIDs for all framebuffer devices".
      - xinit
      - x11-xserver-utils
      # unclutter-xfixes (NOT classic unclutter): the classic version
      # polls X with XQueryPointer and calls XDefineCursor on root
      # windows, which interferes with SDL2's pointer-event subscription
      # and breaks remote-pointer setups (PiKVM, VNC) where motion-only
      # events stop reaching emulators. unclutter-xfixes uses the XFixes
      # extension to passively hide cursors and doesn't have this issue.
      - unclutter-xfixes
      # matchbox-window-manager: tiny kiosk WM. Provides proper window
      # focus management for SDL apps; without a WM, SDL windows can
      # have weird focus semantics. ~5MB installed, no UI.
      - matchbox-window-manager
      - xterm                       # not used but invaluable for debugging
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Remove fbdev driver if it was installed (Pi 5 incompatibility)
  ansible.builtin.apt:
    name: xserver-xorg-video-fbdev
    state: absent
    autoremove: true

- name: Remove classic unclutter if present (replaced by unclutter-xfixes)
  ansible.builtin.apt:
    name: unclutter
    state: absent
    autoremove: true

- name: Pin Xorg modesetting driver to Pi 5's display GPU (card1)
  ansible.builtin.copy:
    dest: /etc/X11/xorg.conf.d/20-pi5-modesetting.conf
    mode: "0644"
    content: |
      # Managed by chimebox Ansible (kiosk-x role).
      # Pi 5 exposes two DRM cards: card0 (V3D, 3D acceleration only,
      # no displays) and card1 (VC6, displays). Without this hint, Xorg
      # auto-probes card0 first and fails with "No devices detected /
      # no screens found" even when an HDMI display is connected.
      Section "OutputClass"
          Identifier  "Pi 5 Display"
          MatchDriver "vc4"
          Driver      "modesetting"
          Option      "PrimaryGPU" "true"
          Option      "kmsdev"     "/dev/dri/card1"
      EndSection

- name: Allow non-root users to start the X server
  ansible.builtin.copy:
    dest: /etc/X11/Xwrapper.config
    mode: "0644"
    content: |
      # Managed by chimebox Ansible (kiosk-x role).
      # 'anybody' is required so the autologin chimebox user can startx
      # without sudo; chimebox's only X client is Basilisk II.
      allowed_users=anybody
      needs_root_rights=yes
  # `needs_root_rights=yes` is kept here as a safety default. It may
  # not be strictly required on Pi 5 with KMS/DRM modesetting (the
  # framebuffer access path doesn't always need root), but it's been
  # validated to work on this combination and toggling it is a
  # boot-time risk we'd rather not take during normal provisioning.
